services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: nest-project-app
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: ${PORT:-3000}
      DATABASE_HOST: postgres
      DATABASE_PORT: 5432
      DATABASE_USERNAME: ${POSTGRES_USER:-nest}
      DATABASE_PASSWORD: ${POSTGRES_PASSWORD:-nest}
      DATABASE_NAME: ${POSTGRES_DB:-nest_project}
      DATABASE_URL: ${DATABASE_URL:-postgresql://nest:nest@postgres:5432/nest_project}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379}
    ports:
      - "${PORT:-3000}:3000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  postgres:
    image: postgres:16-alpine
    container_name: nest-project-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-nest_project}
      POSTGRES_USER: ${POSTGRES_USER:-nest}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-nest}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: nest-project-redis
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    command: ["redis-server", "--appendonly", "yes"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  redis_data:
